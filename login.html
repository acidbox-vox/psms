<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เข้าสู่ระบบ · ระบบจำหน่ายบุคลากร</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="js/api-config.js"></script>
<script src="js/loader.js"></script>
<style>
:root {
  --bg: #f4f6fb;
  --surface: #ffffff;
  --border: #e2e8f0;
  --border-hover: #c7d4e8;
  --text: #1a2340;
  --text2: #5a6a8a;
  --text3: #9aaac0;
  --blue: #3b7cf4;
  --blue-light: rgba(59,124,244,0.08);
  --green: #10b981;
  --red: #ef4444;
  --red-light: rgba(239,68,68,0.08);
  --shadow: 0 2px 12px rgba(26,35,64,0.07);
  --shadow-hover: 0 8px 32px rgba(26,35,64,0.13);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family: 'Sarabun', sans-serif;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px 16px;
  position: relative; overflow-x: hidden;
}
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: radial-gradient(circle, rgba(59,124,244,0.07) 1px, transparent 1px);
  background-size: 28px 28px;
}
body::after {
  content:''; position:fixed; top:0; left:0; right:0; height:3px; z-index:10;
  background: linear-gradient(90deg, #3b7cf4, #7c3aed, #0d9488);
}

.wrap {
  width:100%; max-width:400px;
  position:relative; z-index:1;
}

/* Brand */
.brand {
  text-align:center; margin-bottom:36px;
  animation: slideDown .6s cubic-bezier(.22,.68,0,1.2) both;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:none} }

.brand-ring {
  width:76px; height:76px; border-radius:22px; margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:1.5px solid var(--border);
  box-shadow: var(--shadow), 0 0 0 6px rgba(59,124,244,0.06);
}
.brand-img { width:46px; height:46px; object-fit:contain; }
.brand h1 { font-size:1.7em; font-weight:800; color:var(--text); letter-spacing:-0.025em; }
.brand-sub { font-size:0.84em; color:var(--text2); margin-top:6px; line-height:1.6; }
.brand-pill {
  display:inline-flex; align-items:center; gap:5px;
  margin-top:10px; padding:5px 14px; border-radius:20px;
  background:var(--blue-light); border:1px solid rgba(59,124,244,0.2);
  font-size:0.72em; font-weight:700; color:var(--blue); letter-spacing:.05em;
}

/* Card */
.card {
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:22px; padding:32px 28px;
  box-shadow: var(--shadow);
  animation: cardIn .5s ease .15s both;
}
@keyframes cardIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }

.card-title {
  font-size:1em; font-weight:700; color:var(--text); margin-bottom:6px;
  display:flex; align-items:center; gap:8px;
}
.card-title span { font-size:1.2em; }
.card-desc { font-size:0.82em; color:var(--text2); margin-bottom:24px; line-height:1.5; }

/* OTP Boxes */
.otp-wrap {
  display:flex; gap:10px; justify-content:center; margin-bottom:24px;
}
.otp-box {
  width:54px; height:64px; border-radius:14px;
  border:2px solid var(--border);
  background:var(--bg);
  font-size:1.8em; font-weight:800; color:var(--text);
  text-align:center; outline:none;
  caret-color: var(--blue);
  transition: border-color .2s, box-shadow .2s, transform .15s;
  -webkit-appearance:none;
}
.otp-box:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(59,124,244,0.15);
  background: var(--surface);
  transform: scale(1.05);
}
.otp-box.filled {
  border-color: rgba(59,124,244,0.4);
  background: var(--surface);
}
.otp-box.error {
  border-color: var(--red) !important;
  box-shadow: 0 0 0 3px rgba(239,68,68,0.15) !important;
  animation: shake .35s ease;
}
.otp-box.success {
  border-color: var(--green) !important;
  box-shadow: 0 0 0 3px rgba(16,185,129,0.15) !important;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

/* Error msg */
.error-msg {
  background: var(--red-light); border:1px solid rgba(239,68,68,0.25);
  border-radius:12px; padding:12px 16px;
  font-size:0.82em; color:var(--red); font-weight:600;
  text-align:center; line-height:1.5;
  margin-bottom:16px;
  display:none;
  animation: fadeInUp .3s ease both;
}
@keyframes fadeInUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.error-msg.show { display:block; }

/* Submit btn */
.btn-login {
  width:100%; padding:15px;
  background: linear-gradient(135deg, var(--blue), #5b5cf6);
  color:#fff; border:none; border-radius:14px;
  font-family:'Sarabun',sans-serif; font-size:1em; font-weight:700;
  cursor:pointer; letter-spacing:.03em;
  box-shadow: 0 4px 16px rgba(59,124,244,0.35);
  transition: all .2s ease;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-login:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(59,124,244,0.45);
}
.btn-login:active:not(:disabled) { transform: scale(.97); }
.btn-login:disabled { opacity:.6; cursor:not-allowed; transform:none; }

/* Loading spinner */
.spinner {
  width:18px; height:18px; border:2.5px solid rgba(255,255,255,0.3);
  border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite;
  display:none;
}
@keyframes spin { to { transform:rotate(360deg) } }

/* Success overlay */
.success-overlay {
  position:fixed; inset:0; z-index:9999;
  background:rgba(16,185,129,0.1);
  backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:16px;
}
.success-overlay.show { display:flex; animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.success-box {
  background:#fff; border-radius:24px; padding:36px 40px;
  text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.15);
  animation: popIn .4s cubic-bezier(.22,.68,0,1.3) both;
}
@keyframes popIn { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }
.success-icon { font-size:3.5em; margin-bottom:12px; }
.success-unit { font-size:1.5em; font-weight:800; color:var(--text); margin-bottom:8px; }
.success-text { font-size:0.88em; color:var(--text2); }

/* Dark mode */
html.dark {
  --bg:#0f1117; --surface:#1c2133; --border:#2a3352; --border-hover:#3a4a6e;
  --text:#e8edf8; --text2:#8a9abf; --text3:#4a5a7a;
  --shadow:0 2px 12px rgba(0,0,0,0.4);
}
#dm-btn {
  position:fixed; top:14px; right:18px; z-index:9999;
  width:46px; height:46px; border-radius:50%;
  background:var(--surface); border:1.5px solid var(--border);
  box-shadow:var(--shadow-hover); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; transition:transform .2s ease;
  user-select:none;
}
#dm-btn:hover { transform:scale(1.13) rotate(18deg); }

.footer {
  margin-top:24px; text-align:center; font-size:0.72em;
  color:var(--text3); position:relative; z-index:1;
}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-ring">
      <img src="logowing23.png" class="brand-img" alt="กองบิน ๒๓">
    </div>
    <h1>ระบบจำหน่ายบุคลากร</h1>
    <p class="brand-sub">บันทึกและติดตามการปฏิบัติงาน<br>ป้องกันการจำหน่ายวันซ้ำซ้อน</p>
    <div class="brand-pill">✦ กองบิน ๒๓</div>
  </div>

  <div class="card">
    <div class="card-title"><span>🔐</span> เข้าสู่ระบบ</div>
    <p class="card-desc">กรุณากรอกหมายเลขโทรศัพท์หน่วยของท่าน (หมายเลข 5 ตัว)</p>

    <div class="otp-wrap" id="otpWrap">
      <input class="otp-box" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off" id="d0">
      <input class="otp-box" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off" id="d1">
      <input class="otp-box" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off" id="d2">
      <input class="otp-box" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off" id="d3">
      <input class="otp-box" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off" id="d4">
    </div>

    <div class="error-msg" id="errorMsg">
      ⚠️ ท่านกรอกหมายเลขไม่ถูกต้อง<br>กรุณาติดต่อแอดมิน ผกพ.ฯ
    </div>

    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      <span id="btnText">เข้าสู่ระบบ</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>
</div>

<div class="footer">ระบบจำหน่ายบุคลากร · กองบิน ๒๓</div>

<!-- Success Overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="success-icon">✅</div>
    <div class="success-unit" id="successUnit"></div>
    <div class="success-text">เข้าสู่ระบบสำเร็จ กำลังเข้าสู่หน้าหลัก...</div>
  </div>
</div>

<button id="dm-btn" title="สลับ Dark/Light Mode">🌙</button>

<script>
// ── Dark mode ──
(function(){
  var html = document.documentElement;
  var btn  = document.getElementById('dm-btn');
  function applyTheme(dark){
    if(dark){ html.classList.add('dark'); btn.textContent='☀️'; }
    else     { html.classList.remove('dark'); btn.textContent='🌙'; }
  }
  var saved = localStorage.getItem('theme');
  applyTheme(saved === 'dark');
  btn.addEventListener('click', function(){
    var isDark = html.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    applyTheme(!isDark);
  });
})();

// ── Sound Effects via Web Audio API ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playBeep(freq, dur, type='sine', vol=0.3){
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e){}
}

function playKeyClick(){
  playBeep(800, 0.06, 'square', 0.15);
}

function playLoginSuccess(){
  // Happy ascending chime
  const notes = [523, 659, 784, 1047];
  notes.forEach((f,i) => setTimeout(()=>playBeep(f, 0.18, 'sine', 0.25), i*80));
}

function playLoginFail(){
  // Low buzzer
  playBeep(200, 0.12, 'sawtooth', 0.3);
  setTimeout(()=>playBeep(160, 0.2, 'sawtooth', 0.3), 140);
}

function playSaveSuccess(){
  playBeep(880, 0.1, 'sine', 0.2);
  setTimeout(()=>playBeep(1100, 0.15, 'sine', 0.2), 100);
}

function playSaveFail(){
  playBeep(220, 0.15, 'sawtooth', 0.25);
  setTimeout(()=>playBeep(180, 0.2, 'sawtooth', 0.25), 160);
}

// Expose save sounds globally so other pages can use
window.playSaveSuccess = playSaveSuccess;
window.playSaveFail = playSaveFail;

// ── OTP Input Logic ──
const boxes = Array.from(document.querySelectorAll('.otp-box'));

boxes.forEach((box, i) => {
  box.addEventListener('input', function(e){
    const val = this.value.replace(/\D/g,'');
    this.value = val ? val[0] : '';
    if(val && i < 4) boxes[i+1].focus();
    updateFilled();
    playKeyClick();
    clearError();
  });

  box.addEventListener('keydown', function(e){
    if(e.key === 'Backspace' && !this.value && i > 0){
      boxes[i-1].focus(); boxes[i-1].value = '';
      updateFilled();
    }
    if(e.key === 'Enter') doLogin();
  });

  box.addEventListener('paste', function(e){
    e.preventDefault();
    const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
    paste.split('').slice(0,5).forEach((ch, idx) => {
      if(boxes[idx]) boxes[idx].value = ch;
    });
    updateFilled();
    const next = Math.min(paste.length, 4);
    boxes[next].focus();
  });

  box.addEventListener('focus', function(){
    this.select();
  });
});

// Focus first box on load
boxes[0].focus();

function updateFilled(){
  boxes.forEach(b => b.classList.toggle('filled', b.value.length > 0));
}

function clearError(){
  document.getElementById('errorMsg').classList.remove('show');
  boxes.forEach(b => b.classList.remove('error'));
}

function getCode(){
  return boxes.map(b => b.value).join('');
}

// ── Login ──
async function doLogin(){
  const code = getCode();
  if(code.length < 5){
    // shake empty boxes
    boxes.forEach(b => { if(!b.value) { b.classList.add('error'); setTimeout(()=>b.classList.remove('error'),500); }});
    playLoginFail();
    return;
  }

  const btn = document.getElementById('btnLogin');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('spinner');
  btn.disabled = true;
  btnText.textContent = 'กำลังตรวจสอบ...';
  spinner.style.display = 'block';

  try {
    // Call GAS to verify unit number and log access
    const url = GAS_API_URL + '?action=login&code=' + encodeURIComponent(code);
    const res = await fetch(url);
    const data = await res.json();

    if(data.success){
      // Save session
      sessionStorage.setItem('unitName', data.unitName);
      sessionStorage.setItem('unitCode', code);
      sessionStorage.setItem('loggedIn', '1');

      // Mark boxes success
      boxes.forEach(b => b.classList.add('success'));
      playLoginSuccess();

      // Show success overlay
      document.getElementById('successUnit').textContent = data.unitName;
      document.getElementById('successOverlay').classList.add('show');

      // เริ่ม preload ข้อมูลระหว่างรอ redirect — พอไปถึงหน้าอื่น cache พร้อมแล้ว
      if(window.DataCache) DataCache.preload();

      // Redirect after delay
      setTimeout(() => { window.location.href = 'index.html'; }, 1800);
    } else {
      showError();
    }
  } catch(err){
    // Network error — try fallback offline check? No, just show error
    showError();
  } finally {
    btn.disabled = false;
    btnText.textContent = 'เข้าสู่ระบบ';
    spinner.style.display = 'none';
  }
}

function showError(){
  playLoginFail();
  boxes.forEach(b => { b.classList.add('error'); });
  document.getElementById('errorMsg').classList.add('show');
  setTimeout(()=>{ boxes.forEach(b => b.classList.remove('error')); }, 600);
  // Clear boxes
  setTimeout(()=>{ boxes.forEach(b => b.value=''); updateFilled(); boxes[0].focus(); }, 800);
}
</script>
<script>if(window.Loader)Loader.hide();</script>
</body>
</html>
