<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>รายงานสถานะจำหน่าย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="js/api-config.js"></script>
<script src="js/cache.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>(function(){if(!sessionStorage.getItem("loggedIn")){window.location.replace("login.html");}})()</script>
<style>
:root{
  --bg:#f4f6fb;--bg2:#eef1f8;--surface:#fff;--border:#e2e8f0;
  --text:#1a2340;--text2:#5a6a8a;--text3:#9aaac0;
  --blue:#3b7cf4;--green:#059669;--shadow:0 2px 12px rgba(26,35,64,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;min-height:100vh;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;align-items:center;padding:0 16px 80px}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:3px;z-index:10;
  background:linear-gradient(90deg,#10b981,#3b7cf4)}
.topbar{display:flex;align-items:center;gap:12px;padding:22px 0 18px;width:100%;max-width:980px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;
  background:var(--surface);border:1.5px solid var(--border);color:var(--text2);
  font-size:.82em;font-weight:600;cursor:pointer;text-decoration:none;box-shadow:var(--shadow);transition:all .2s}
.back-btn:hover{color:var(--text);border-color:#c7d4e8}
.page-title{font-size:1em;font-weight:700;flex:1}
.wrap{width:100%;max-width:980px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.wrap{animation:fadeUp .35s ease}

/* ── Filter card ── */
.filter-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
  padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.filter-title{font-size:.7em;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--text3);margin-bottom:14px}
.filter-section{margin-bottom:12px;padding-bottom:12px;border-bottom:1px dashed var(--border)}
.filter-section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.section-lbl{font-size:.72em;font-weight:700;color:var(--text2);margin-bottom:8px;
  display:flex;align-items:center;gap:5px}
.filter-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px}
.filter-group label{font-size:.72em;font-weight:600;color:var(--text2)}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:11px;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;font-size:12px}
select,input[type=text],input[type=date]{
  width:100%;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:9px;color:var(--text);font-size:13px;font-family:'Sarabun',sans-serif;
  outline:none;transition:all .2s;appearance:none;-webkit-appearance:none}
select{cursor:pointer;padding-right:28px}
input[type=date]{cursor:pointer}
select:focus,input:focus{border-color:rgba(59,124,244,.5);background:#fff;
  box-shadow:0 0 0 3px rgba(59,124,244,.08)}

/* mode toggle */
.mode-toggle{display:flex;border:1.5px solid var(--border);border-radius:9px;overflow:hidden;background:var(--bg);height:38px}
.mode-btn{flex:1;padding:0 14px;border:none;background:transparent;font-family:'Sarabun',sans-serif;
  font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;transition:all .2s;white-space:nowrap}
.mode-btn.active{background:var(--blue);color:#fff}

/* Type checkboxes */
.type-checks{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.type-check{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;
  background:var(--bg);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;
  font-size:.82em;font-weight:600;user-select:none}
.type-check:hover{border-color:#c7d4e8}
.type-check input{display:none}
.type-check.chk-ลา.on      {background:rgba(239,68,68,.09);border-color:rgba(239,68,68,.35);color:#dc2626}
.type-check.chk-ศึกษา.on   {background:rgba(124,58,237,.09);border-color:rgba(124,58,237,.35);color:#7c3aed}
.type-check.chk-ราชการ.on  {background:rgba(59,124,244,.09);border-color:rgba(59,124,244,.35);color:var(--blue)}
.type-check.chk-ล่วงเวลา.on{background:rgba(5,150,105,.09);border-color:rgba(5,150,105,.35);color:#059669}
.type-check.chk-เวร.on     {background:rgba(8,145,178,.09);border-color:rgba(8,145,178,.35);color:#0891b2}
.type-check.chk-อื่นๆ.on   {background:rgba(217,119,6,.09);border-color:rgba(217,119,6,.35);color:#d97706}

/* People tags */
.people-wrap{display:flex;flex-direction:column;gap:6px;flex:1;min-width:220px}
.people-search-row{display:flex;gap:6px}
.people-input-wrap{position:relative;flex:1}
.people-input-wrap input{padding-right:32px}
.people-clear-input{position:absolute;right:9px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0}
.people-dropdown{position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:100;
  background:var(--surface);border:1.5px solid var(--border);border-radius:9px;
  box-shadow:0 4px 18px rgba(26,35,64,.12);max-height:200px;overflow-y:auto;display:none}
.people-dropdown.show{display:block}
.pd-item{padding:9px 13px;cursor:pointer;font-size:.88em;transition:background .12s}
.pd-item:hover{background:var(--bg)}
.pd-item.selected{color:var(--text3);font-style:italic}
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px;min-height:24px}
.person-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;
  background:rgba(59,124,244,.1);border:1px solid rgba(59,124,244,.3);
  color:var(--blue);font-size:.8em;font-weight:700}
.person-tag button{background:none;border:none;cursor:pointer;color:inherit;padding:0;
  font-size:11px;line-height:1;opacity:.7}
.person-tag button:hover{opacity:1}
.people-hint{font-size:.71em;color:var(--text3);margin-top:2px}

/* Buttons */
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{padding:9px 18px;border-radius:9px;font-family:'Sarabun',sans-serif;font-size:13px;
  font-weight:700;cursor:pointer;border:1.5px solid;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#2563d0;border-color:#2563d0}
.btn-ghost{background:var(--surface);color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{color:var(--text);border-color:#c7d4e8}
.btn-print{background:var(--green);color:#fff;border-color:var(--green)}
.btn-print:hover{background:#047857;border-color:#047857}
.btn-excel{background:#217346;color:#fff;border-color:#217346}
.btn-excel:hover{background:#1a5c38;border-color:#1a5c38}

/* ── Report preview ── */
.report-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;
  box-shadow:var(--shadow);overflow:hidden}
.report-inner{padding:32px 36px}
.rpt-header{display:flex;align-items:center;gap:16px;margin-bottom:10px;
  border-bottom:2px solid var(--border);padding-bottom:16px}
.rpt-logo{width:64px;height:64px;object-fit:contain;flex-shrink:0}
.rpt-title-block{flex:1}
.rpt-org{font-size:.78em;color:var(--text2);font-weight:600;margin-bottom:2px}
.rpt-title{font-size:1.3em;font-weight:800;color:var(--text);line-height:1.2}
.rpt-sub{font-size:.78em;color:var(--text3);margin-top:4px}
.rpt-meta{text-align:right;font-size:.74em;color:var(--text3);line-height:1.8;flex-shrink:0}
.rpt-meta strong{color:var(--text2)}
.rpt-summary{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.sum-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;
  border-radius:20px;font-size:.8em;font-weight:700;border:1.5px solid}
.sum-total{background:rgba(59,124,244,.08);color:var(--blue);border-color:rgba(59,124,244,.25)}
.sum-la   {background:rgba(239,68,68,.08);color:#dc2626;border-color:rgba(239,68,68,.2)}
.sum-study{background:rgba(124,58,237,.08);color:#7c3aed;border-color:rgba(124,58,237,.2)}
.sum-gov  {background:rgba(59,124,244,.08);color:var(--blue);border-color:rgba(59,124,244,.2)}
.sum-ot   {background:rgba(5,150,105,.08);color:#059669;border-color:rgba(5,150,105,.2)}
.sum-duty {background:rgba(8,145,178,.08);color:#0891b2;border-color:rgba(8,145,178,.2)}
.sum-other{background:rgba(217,119,6,.08);color:#d97706;border-color:rgba(217,119,6,.2)}
.rpt-table-wrap{overflow-x:auto;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:.85em}
thead th{padding:9px 12px;text-align:left;font-size:.72em;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;color:var(--text3);
  background:var(--bg);border-bottom:1.5px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:nth-child(even){background:rgba(244,246,251,.6)}
tbody td{padding:8px 12px;color:var(--text);vertical-align:middle}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;
  border-radius:20px;font-size:.8em;font-weight:700;white-space:nowrap}
.b-ลา      {background:rgba(239,68,68,.08);color:#dc2626;border:1px solid rgba(239,68,68,.2)}
.b-ศึกษา   {background:rgba(124,58,237,.08);color:#7c3aed;border:1px solid rgba(124,58,237,.2)}
.b-ราชการ  {background:rgba(59,124,244,.08);color:var(--blue);border:1px solid rgba(59,124,244,.2)}
.b-ล่วงเวลา{background:rgba(5,150,105,.08);color:#059669;border:1px solid rgba(5,150,105,.2)}
.b-อื่นๆ   {background:rgba(217,119,6,.08);color:#d97706;border:1px solid rgba(217,119,6,.2)}
.b-เวร     {background:rgba(8,145,178,.08);color:#0891b2;border:1px solid rgba(8,145,178,.2)}
.dept-tag{display:inline-block;padding:1px 8px;border-radius:5px;background:var(--bg2);
  font-size:.85em;color:var(--text2);border:1px solid var(--border)}
.days-pill{display:inline-block;padding:1px 7px;border-radius:5px;background:var(--bg);
  font-size:.85em;color:var(--text3);font-weight:700;border:1px solid var(--border)}
.no-col{color:var(--text3);font-size:.85em}
.note-cell:empty::before{content:attr(data-placeholder);color:var(--text3)}
.note-cell:focus{background:rgba(59,124,244,.04);border-radius:4px;
  box-shadow:inset 0 0 0 1.5px rgba(59,124,244,.25)}
@media print{
  .note-cell{border-bottom:1px solid #ccc;min-width:100px}
  .note-cell:empty::before{content:''}
}

/* Certification */
.rpt-cert{margin-top:32px;padding:20px 24px;border:1.5px dashed var(--border);
  border-radius:10px;background:rgba(244,246,251,.5)}
.rpt-cert p{font-size:.88em;line-height:1.9;color:var(--text)}
.rpt-cert .sig-line{margin-top:16px;display:flex;align-items:flex-end;gap:32px;flex-wrap:wrap}
.sig-block{display:flex;flex-direction:column;gap:4px;font-size:.83em;color:var(--text2)}
.sig-dots{letter-spacing:2px;color:var(--text3)}

.rpt-footer{margin-top:20px;padding-top:14px;border-top:1.5px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-end;font-size:.74em;color:var(--text3)}
.empty-state{text-align:center;padding:60px 24px;color:var(--text3)}
.empty-state .ei{font-size:36px;margin-bottom:10px}
.loading-row{text-align:center;padding:44px;color:var(--text3);font-size:.9em;
  display:flex;align-items:center;justify-content:center;gap:10px}
.spinner{width:15px;height:15px;border:2px solid rgba(59,124,244,.2);border-top-color:var(--blue);
  border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}




/* Progress bar */
.load-progress-wrap{padding:28px 36px;text-align:center}
.load-title{font-size:.9em;font-weight:700;color:var(--text);margin-bottom:6px}
.load-sub{font-size:.78em;color:var(--text3);margin-bottom:14px}
.progress-track{height:10px;background:var(--bg2);border-radius:99px;overflow:hidden;margin:0 auto;max-width:360px}
.progress-bar{height:100%;background:linear-gradient(90deg,#3b7cf4,#10b981);border-radius:99px;
  transition:width .3s ease;width:0%}
.progress-pct{font-size:1.1em;font-weight:800;color:var(--blue);margin-top:8px}
.load-step{font-size:.75em;color:var(--text3);margin-top:5px;min-height:18px}

/* People status chip */
.people-status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  border-radius:20px;font-size:.76em;font-weight:700;margin-top:3px}
.pst-loading{background:rgba(59,124,244,.08);color:var(--blue);border:1px solid rgba(59,124,244,.2)}
.pst-ready{background:rgba(5,150,105,.08);color:#059669;border:1px solid rgba(5,150,105,.2)}
.pst-empty{background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
.pst-spinner{width:10px;height:10px;border:1.5px solid rgba(59,124,244,.2);border-top-color:var(--blue);
  border-radius:50%;animation:spin .8s linear infinite;display:inline-block}

/* ── PRINT ── */
@media print{
  @page{size:A4 portrait;margin:15mm 14mm 18mm 14mm}
  body{background:#fff!important;padding:0!important;display:block!important}
  body::after{display:none!important}
  .topbar,.filter-card,.no-print{display:none!important}
  .wrap{max-width:100%!important;animation:none!important}
  .report-wrap{border:none!important;border-radius:0!important;box-shadow:none!important}
  .report-inner{padding:0!important}
  .rpt-header{border-bottom:2px solid #1a2340!important;padding-bottom:10px!important}
  .rpt-summary{margin:10px 0!important;gap:6px!important}
  .sum-badge,.badge,.dept-tag,.days-pill,.rpt-cert{
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sum-badge{padding:4px 10px!important;font-size:.75em!important}
  table{font-size:.8em!important}
  thead th{padding:7px 10px!important;background:#f4f6fb!important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  tbody td{padding:6px 10px!important}
  tbody tr:nth-child(even){background:#f9fafb!important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  tbody tr{page-break-inside:avoid}
  .rpt-cert{border:1.5px dashed #c0cce0!important;background:#fafbfd!important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .rpt-footer{margin-top:16px!important}
}
</style>
</head>
<body>

<div class="topbar no-print">
  <a href="leave-status.html" class="back-btn">← สถานะจำหน่าย</a>
  <span class="page-title">🖨️ รายงานสถานะจำหน่าย</span>
</div>

<div class="wrap">

  <!-- ═══ Filter card ═══ -->
  <div class="filter-card no-print">
    <div class="filter-title">⚙️ ตั้งค่าการรายงาน</div>

    <!-- ① แผนก + ช่วงเวลา -->
    <div class="filter-section">
      <div class="section-lbl">🏢 แผนก &amp; ช่วงเวลา</div>
      <div class="filter-row">
        <div class="filter-group" style="min-width:150px">
          <label>แผนก</label>
          <div class="sel-wrap">
            <select id="f-dept">
              <option value="">— เลือกแผนก —</option>
            </select>
          </div>
        </div>
        <div class="filter-group" style="min-width:190px;flex:0">
          <label>ช่วงเวลา</label>
          <div class="mode-toggle">
            <button class="mode-btn active" id="btn-mode-month" onclick="setMode('month')">📅 เดือน</button>
            <button class="mode-btn" id="btn-mode-range" onclick="setMode('range')">📆 ช่วงวัน</button>
          </div>
        </div>
        <div class="filter-group" id="group-month" style="min-width:150px">
          <label>เดือน</label>
          <div class="sel-wrap">
            <select id="f-month">
              <option value="">ทุกเดือน</option>
              <option value="01">มกราคม</option><option value="02">กุมภาพันธ์</option>
              <option value="03">มีนาคม</option><option value="04">เมษายน</option>
              <option value="05">พฤษภาคม</option><option value="06">มิถุนายน</option>
              <option value="07">กรกฎาคม</option><option value="08">สิงหาคม</option>
              <option value="09">กันยายน</option><option value="10">ตุลาคม</option>
              <option value="11">พฤศจิกายน</option><option value="12">ธันวาคม</option>
            </select>
          </div>
        </div>
        <div id="group-range" style="display:none;flex:1;min-width:300px">
          <div class="filter-row" style="gap:8px">
            <div class="filter-group">
              <label>วันที่เริ่มต้น</label>
              <input type="date" id="f-date-from">
            </div>
            <div class="filter-group">
              <label>วันที่สิ้นสุด</label>
              <input type="date" id="f-date-to">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ② ประเภท -->
    <div class="filter-section">
      <div class="section-lbl">🗂️ ประเภทการจำหน่าย <span style="color:var(--text3);font-weight:400;font-size:.9em">(คลิกเลือก/ยกเลิก)</span></div>
      <div class="type-checks" id="type-checks">
        <!-- สร้างจาก JS -->
      </div>
    </div>

    <!-- ③ ค้นหารายชื่อ (เพิ่มหลายคน) -->
    <div class="filter-section">
      <div class="section-lbl">👤 เลือกรายชื่อ (ไม่ระบุ = ทุกคน)</div>
      <div class="people-wrap">
        <div class="people-search-row">
          <div class="people-input-wrap" style="position:relative">
            <input type="text" id="people-input" placeholder="พิมพ์ชื่อเพื่อค้นหา..." autocomplete="off"
              oninput="onPeopleInput()" onkeydown="onPeopleKey(event)" onfocus="showDrop()">
            <button class="people-clear-input" onclick="clearPeopleInput()" title="ล้าง">✕</button>
            <div class="people-dropdown" id="people-dropdown"></div>
          </div>
          <button class="btn btn-ghost" onclick="clearPeople()" style="flex:0;white-space:nowrap">ล้างรายชื่อ</button>
        </div>
        <div class="tags-wrap" id="people-tags"></div>
        <div class="people-hint" id="people-hint">ยังไม่ได้เลือก — จะแสดงทุกคนในแผนกที่เลือก</div>
        <div class="people-status pst-empty" id="people-status">⏳ กด "แสดงรายงาน" เพื่อโหลดข้อมูลก่อนค้นหาชื่อ</div>
      </div>
    </div>

    <!-- ④ ปุ่ม -->
    <div class="btn-row" style="margin-top:4px">
      <button class="btn btn-primary" onclick="doSearch()">🔍 แสดงรายงาน</button>
      <button class="btn btn-ghost" onclick="clearFilters()">✕ ล้างทั้งหมด</button>
      <button class="btn btn-print" id="btn-pdf" style="display:none" onclick="printReport()">🖨️ พิมพ์ / PDF</button>
      <button class="btn btn-excel" id="btn-excel" style="display:none" onclick="exportExcel()">📊 Export Excel</button>
    </div>
  </div>

  <!-- ═══ Report ═══ -->
  <div class="report-wrap">
    <div class="report-inner" id="report-inner">
      <div class="empty-state">
        <div class="ei">🗂️</div>
        <p>กรุณาตั้งค่าตัวกรอง แล้วกด <strong>แสดงรายงาน</strong></p>
      </div>
    </div>
  </div>
</div>

<script>
const API = localStorage.getItem('gasApiUrl') || GAS_API_URL;
let allData   = [];
let dataLoaded = false;
let currentMode = 'month';
let selectedPeople = []; // รายชื่อที่เลือก (array of strings)

const TH_M_FULL  = ['','มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                    'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const TH_M_SHORT = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.',
                    'ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const TYPE_ICON  = {'ลา':'🏖️','ศึกษา':'🎓','ราชการ':'🏛️','ล่วงเวลา':'⏰','เวร':'🌙','อื่นๆ':'📌'};
const TYPE_ALL   = ['ลา','ศึกษา','ราชการ','ล่วงเวลา','เวร','อื่นๆ'];
const TYPE_CLS   = {'ลา':'sum-la','ศึกษา':'sum-study','ราชการ':'sum-gov',
                    'ล่วงเวลา':'sum-ot','เวร':'sum-duty','อื่นๆ':'sum-other'};

/* ── helpers ── */
function thDate(s){
  if(!s||s==='-') return '-'; s=String(s).trim();
  let y,m,d;
  if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)){const p=s.split('-');y=+p[0];m=+p[1];d=+p[2];}
  else if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)){const p=s.split('/');d=+p[0];m=+p[1];y=+p[2];}
  else return s;
  if(!y||!m||!d||m<1||m>12||d<1||d>31) return '-';
  return `${d} ${TH_M_SHORT[m]} ${y+543}`;
}
function toISO(s){
  if(!s||s==='-') return '';
  s=String(s).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)){
    const p=s.split('/');return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
  }
  return s;
}
function dayCount(a,b){
  if(!a||!b) return 1;
  const da=new Date(a),db=new Date(b);
  if(isNaN(da)||isNaN(db)) return 1;
  return Math.round((db-da)/86400000)+1;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function nowTH(){
  const n=new Date(),d=n.getDate(),m=n.getMonth()+1,y=n.getFullYear()+543;
  const hh=String(n.getHours()).padStart(2,'0'),mm=String(n.getMinutes()).padStart(2,'0');
  return `${d} ${TH_M_FULL[m]} ${y}  เวลา ${hh}:${mm} น.`;
}

/* ── Build type checkboxes ── */
function buildTypeChecks(){
  const wrap = document.getElementById('type-checks');
  wrap.innerHTML = '';
  TYPE_ALL.forEach(t => {
    const el = document.createElement('div');
    el.className = `type-check chk-${t} on`;
    el.dataset.type = t;
    el.innerHTML = `${TYPE_ICON[t]||''} ${t}`;
    el.onclick = () => { el.classList.toggle('on'); if(dataLoaded) renderReport(); };
    wrap.appendChild(el);
  });
}
function getSelectedTypes(){
  return [...document.querySelectorAll('.type-check.on')].map(el=>el.dataset.type);
}

/* ── People picker ── */
function getAllNames(){
  return [...new Set(allData.map(r=>r.name).filter(Boolean))].sort();
}
function onPeopleInput(){
  const q=(document.getElementById('people-input').value||'').trim().toLowerCase();
  if(!q){hideDrop();return;}
  if(!dataLoaded){
    const dd=document.getElementById('people-dropdown');
    dd.innerHTML='<div class="pd-item" style="color:var(--blue)"><span style="font-size:11px">⚠️</span> กด "แสดงรายงาน" เพื่อโหลดข้อมูลก่อน จึงจะค้นหาชื่อได้</div>';
    dd.classList.add('show');return;
  }
  const names = getAllNames().filter(n=>n.toLowerCase().includes(q)).slice(0,20);
  const dd = document.getElementById('people-dropdown');
  if(!names.length){dd.innerHTML='<div class="pd-item" style="color:var(--text3)">ไม่พบรายชื่อ</div>';dd.classList.add('show');return;}
  dd.innerHTML = names.map(n=>{
    const sel = selectedPeople.includes(n);
    return `<div class="pd-item${sel?' selected':''}" onclick="addPerson('${n.replace(/'/g,"\\'")}')">
      ${sel?'✓ ':''}${esc(n)}
    </div>`;
  }).join('');
  dd.classList.add('show');
}
function showDrop(){if(document.getElementById('people-input').value.trim()) onPeopleInput();}
function hideDrop(){document.getElementById('people-dropdown').classList.remove('show');}
function addPerson(name){
  if(!selectedPeople.includes(name)) selectedPeople.push(name);
  renderTags();
  document.getElementById('people-input').value='';
  hideDrop();
}
function removePerson(name){
  selectedPeople=selectedPeople.filter(n=>n!==name);
  renderTags();
}
function renderTags(){
  const wrap=document.getElementById('people-tags');
  const hint=document.getElementById('people-hint');
  if(!selectedPeople.length){
    wrap.innerHTML='';
    hint.textContent='ยังไม่ได้เลือก — จะแสดงทุกคนในแผนกที่เลือก';

  ).join('');

window.onload = async function(){
  buildTypeChecks();
  document.getElementById('f-month').value = String(new Date().getMonth()+1).padStart(2,'0');
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const last=new Date(y,m+1,0);
  document.getElementById('f-date-from').value=`${y}-${String(m+1).padStart(2,'0')}-01`;
  document.getElementById('f-date-to').value=`${y}-${String(m+1).padStart(2,'0')}-${String(last.getDate()).padStart(2,'0')}`;
  if(!API) return;
  try{
    let depts=[];
    if(window.DataCache){const map=await DataCache.getDepts();depts=Object.keys(map||{}).sort();}
    else{const map=await fetch(API+'?action=getDepts').then(r=>r.json())||{};depts=Object.keys(map).sort();}
    const sel=document.getElementById('f-dept');
    sel.innerHTML='<option value="">— เลือกแผนก —</option><option value="ALL">ทุกแผนก</option>';

  }catch(e){}

  try{
    const cached=sessionStorage.getItem('cache_leaves');
    if(cached){
      const obj=JSON.parse(cached);
      if(Date.now()-obj.ts < 3*60*1000){
        allData=obj.data||[]; dataLoaded=true;
        setPeopleStatus('ready',`✅ มีข้อมูลใน cache — พร้อมค้นหา ${allData.length} รายการ`);
      }
    }
  }catch(e){}
};

/* ── Progress helpers ── */
function showProgress(pct, step){
  document.getElementById('report-inner').innerHTML=`
    <div class="load-progress-wrap">
      <div class="load-title">📡 กำลังโหลดข้อมูล...</div>
      <div class="load-sub">โหลดครั้งแรกอาจใช้เวลาสักครู่</div>
      <div class="progress-track"><div class="progress-bar" id="prog-bar" style="width:${pct}%"></div></div>
      <div class="progress-pct">${pct}%</div>
      <div class="load-step" id="prog-step">${step||''}</div>
    </div>`;
}
function updateProgress(pct, step){
  const bar=document.getElementById('prog-bar');
  const stepEl=document.getElementById('prog-step');
  if(bar) bar.style.width=pct+'%';
  if(stepEl && step) stepEl.textContent=step;
  const pctEl=document.getElementById('report-inner').querySelector('.progress-pct');
  if(pctEl) pctEl.textContent=pct+'%';
}
function setPeopleStatus(state, text){
  const el=document.getElementById('people-status');
  if(!el) return;
  el.className='people-status';
  if(state==='loading') el.classList.add('pst-loading');
  else if(state==='ready') el.classList.add('pst-ready');
  else el.classList.add('pst-empty');
  el.innerHTML = state==='loading'
    ? `<span class="pst-spinner"></span> ${text}`
    : text;
}

async function loadData(force){
  if(!API){
    document.getElementById('report-inner').innerHTML='<div class="empty-state"><div class="ei">⚙️</div><p>ยังไม่ตั้งค่า API URL</p></div>';
    return;
  }

  // ถ้า DataCache มีข้อมูลอยู่แล้ว (cache hit) — แสดง progress แบบเร็ว
  const cached = !force && window.sessionStorage && sessionStorage.getItem('cache_leaves');
  if(cached){
    showProgress(30,'📦 อ่านจาก cache...');
    setPeopleStatus('loading','กำลังเตรียมข้อมูล...');
    await new Promise(r=>setTimeout(r,80));
    updateProgress(80,'✅ โหลดจาก cache สำเร็จ');
    await new Promise(r=>setTimeout(r,120));
  } else {
    showProgress(5,'🌐 กำลังเชื่อมต่อ GAS...');
    setPeopleStatus('loading','กำลังโหลดข้อมูลจากเซิร์ฟเวอร์...');
  }

  try{
    let data;
    if(window.DataCache && cached){
      data = await DataCache.getLeaves(force);
      updateProgress(95,'🔄 ประมวลผล...');
    } else {
      // Fetch with Content-Length progress if available
      updateProgress(10,'📡 ดึงข้อมูลจาก Google Apps Script...');
      const resp = await fetch((window.DataCache?GAS_API_URL:API)+'?action=getLeaves');
      const contentLength = resp.headers.get('Content-Length');
      if(contentLength){
        const total = +contentLength;
        const reader = resp.body.getReader();
        let received = 0; const chunks = [];
        while(true){
          const {done,value} = await reader.read();
          if(done) break;
          chunks.push(value); received+=value.length;
          const pct = Math.min(85, 10 + Math.round((received/total)*75));
          updateProgress(pct, `📥 รับข้อมูล ${(received/1024).toFixed(0)} KB...`);
        }
        updateProgress(88,'🔄 แปลงข้อมูล...');
        const text = new TextDecoder().decode(
          chunks.reduce((a,b)=>{ const c=new Uint8Array(a.length+b.length); c.set(a);c.set(b,a.length);return c;},
          new Uint8Array(0)));
        data = JSON.parse(text)||[];
        if(window.DataCache) sessionStorage.setItem('cache_leaves',JSON.stringify({ts:Date.now(),data}));
      } else {
        // No Content-Length — fake incremental progress
        updateProgress(15,'📡 รอการตอบกลับ...');
        const timer = setInterval(()=>{
          const bar=document.getElementById('prog-bar');
          if(!bar){clearInterval(timer);return;}
          const cur=parseFloat(bar.style.width)||15;
          if(cur<82) { bar.style.width=(cur+2)+'%';
            const pctEl=document.getElementById('report-inner').querySelector('.progress-pct');
            if(pctEl) pctEl.textContent=Math.round(cur+2)+'%'; }
        },400);
        try{
          data = window.DataCache ? await DataCache.getLeaves(force)
            : await resp.json()||[];
        }finally{ clearInterval(timer); }
        updateProgress(88,'🔄 ประมวลผล...');
      }
    }
    await new Promise(r=>setTimeout(r,100));
    updateProgress(95,'🗂️ เตรียมรายชื่อ...');
    allData = data || [];
    dataLoaded=true;

    // sync dept dropdown
    const depts=[...new Set(allData.map(r=>r.dept).filter(Boolean))].sort();
    const sel=document.getElementById('f-dept');const cur=sel.value;
    const existing=[...sel.options].map(o=>o.value).filter(v=>v&&v!=='ALL');
    if(depts.some(d=>!existing.includes(d))){
      sel.innerHTML='<option value="">— เลือกแผนก —</option><option value="ALL">ทุกแผนก</option>';
      depts.forEach(d=>sel.innerHTML+=`<option value="${esc(d)}"${d===cur?' selected':''}>${esc(d)}</option>`);
      if(cur) sel.value=cur;
    }

    updateProgress(100,'✅ โหลดสำเร็จ '+allData.length+' รายการ');
    setPeopleStatus('ready',`✅ พร้อมค้นหา — มีข้อมูล ${allData.length} รายการ`);
    await new Promise(r=>setTimeout(r,400));
    renderReport();
  }catch(e){
    setPeopleStatus('empty','❌ โหลดไม่สำเร็จ');
    document.getElementById('report-inner').innerHTML=
      `<div class="empty-state"><div class="ei">❌</div><p>โหลดข้อมูลไม่ได้<br><small style="color:#999">${esc(e.message)}</small></p></div>`;
  }
}

/* ── Filter logic ── */
function filterRows(){
  const dept=document.getElementById('f-dept').value;
  const deptFilter=dept==='ALL'?'':dept;
  const month=document.getElementById('f-month').value;
  const dateFrom=document.getElementById('f-date-from').value;
  const dateTo=document.getElementById('f-date-to').value;
  const selTypes=getSelectedTypes();

  return allData.filter(r=>{
    // แผนก (ถ้ามีรายชื่อที่เลือกไว้ ข้ามตัวกรองแผนก)
    if(!selectedPeople.length && deptFilter && r.dept!==deptFilter) return false;
    // รายชื่อ
    if(selectedPeople.length && !selectedPeople.includes(r.name)) return false;
    // ประเภท
    if(!selTypes.includes(r.leaveType)) return false;
    // ช่วงเวลา
    const rFrom=toISO(r.dateFrom), rTo=toISO(r.dateTo||r.dateFrom);
    if(currentMode==='month' && month){
      if(!rFrom) return false;
      const sd=new Date(rFrom.slice(0,4),+rFrom.slice(5,7)-1,1);
      const ed=new Date(rTo.slice(0,4),+rTo.slice(5,7)-1,28);
      let found=false;
      for(let y=sd.getFullYear();y<=ed.getFullYear()+1;y++){
        if(new Date(y,+month-1,15)>=sd&&new Date(y,+month-1,15)<=ed){found=true;break;}
      }
      if(!found) return false;
    }
    if(currentMode==='range'&&(dateFrom||dateTo)){
      if(!rFrom) return false;
      if(rTo<(dateFrom||'0000-00-00')||rFrom>(dateTo||'9999-99-99')) return false;
    }
    return true;
  });
}

  const data=indexed.map(({r},i)=>[
    i+1, r.name||'-', r.dept||'-', r.leaveType||'-',
    thDate(r.dateFrom), thDate(r.dateTo), dayCount(r.dateFrom,r.dateTo),
    noteCells[i]?noteCells[i].innerText.trim():''
  ]);

  // title rows
  const titleRows=[
    [unitName||'ระบบบันทึกการจำหน่าย'],
    ['รายงานสถานะการจำหน่ายกำลังพล'],
  ];
  if(dept) titleRows.push([`แผนก: ${dept==='ALL'?'ทุกแผนก':dept}`]);
  if(currentMode==='month'&&month) titleRows.push([`เดือน: ${TH_M_FULL[+month]}`]);
  if(currentMode==='range'&&(dateFrom||dateTo)) titleRows.push([`ช่วง: ${thDate(dateFrom)} – ${thDate(dateTo)}`]);
  titleRows.push([`พิมพ์เมื่อ: ${nowTH()}`],['11-7'],['']);

  const wb=XLSX.utils.book_new();
  const wsData=[...titleRows, headers, ...data];
  wsData.push([]);
  wsData.push(['ขอรับรองว่า รายชื่อตามเรื่องนี้ไม่มีการซ้ำซ้อนกันในการเบิก OT, ไปราชการอื่นๆ และศึกษา']);
  wsData.push([]);
  wsData.push(['ลงชื่อ ......................................']);
  wsData.push(['       (.....................................)']);
  wsData.push(['วันที่ ........./........./..........']);

  const ws=XLSX.utils.aoa_to_sheet(wsData);

  // column widths
  ws['!cols']=[{wch:5},{wch:28},{wch:14},{wch:12},{wch:16},{wch:16},{wch:10},{wch:22}];

  // style header row (row index = titleRows.length)
  const hdrRow=titleRows.length;
  headers.forEach((_,ci)=>{
    const cell=XLSX.utils.encode_cell({r:hdrRow,c:ci});
    if(ws[cell]) ws[cell].s={font:{bold:true},fill:{fgColor:{rgb:'EEF1F8'}}};
  });

  XLSX.utils.book_append_sheet(wb,ws,'รายงานจำหน่าย');

  // filename
  let fname='รายงานจำหน่าย';
  if(dept&&dept!=='ALL') fname+=`_${dept}`;
  if(currentMode==='month'&&month) fname+=`_${TH_M_FULL[+month]}`;
  else if(currentMode==='range'&&dateFrom) fname+=`_${dateFrom}`;
  XLSX.writeFile(wb,`${fname}.xlsx`);
}

function clearFilters(){
  document.getElementById('f-dept').value='';
  document.getElementById('f-month').value=String(new Date().getMonth()+1).padStart(2,'0');
  document.getElementById('f-search') && (document.getElementById('f-search').value='');
  selectedPeople=[];renderTags();
  buildTypeChecks();
  setMode('month');
  document.getElementById('btn-pdf').style.display='none';
  document.getElementById('btn-excel').style.display='none';
  document.getElementById('report-inner').innerHTML=
    '<div class="empty-state"><div class="ei">🗂️</div><p>กรุณาตั้งค่าตัวกรอง แล้วกด <strong>แสดงรายงาน</strong></p></div>';
}

function printReport(){window.print();}
</script>
